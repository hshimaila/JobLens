<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JobLens — Resume Matcher</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-gradient-to-br from-indigo-50 to-blue-100 flex items-center justify-center">

<div class="bg-white shadow-2xl rounded-2xl p-8 w-full max-w-xl">
    <h1 class="text-3xl font-bold text-indigo-600 text-center mb-2">
        JobLens
    </h1>
    <p class="text-center text-gray-500 mb-6">
        Analyze your resume against any job description
    </p>

    {% if error %}
        <div class="bg-red-100 text-red-700 px-4 py-2 rounded mb-4">
            {{ error }}
        </div>
    {% endif %}

    <form method="POST" enctype="multipart/form-data" class="space-y-4">
        {% csrf_token %}

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">
                Upload Resume (PDF)
            </label>
            <input type="file" name="resume" required
                   class="block w-full border border-gray-300 rounded-lg p-2">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">
                Job Description
            </label>
            <textarea name="job_description" rows="5" required
                      placeholder="Paste the job description here..."
                      class="block w-full border border-gray-300 rounded-lg p-3 focus:ring-indigo-500 focus:border-indigo-500"></textarea>
        </div>

        <button type="submit"
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-xl transition">
            Analyze Resume
        </button>
    </form>

    <p class="text-xs text-gray-400 text-center mt-4">
        Powered by NLP & Skill Matching
    </p>
</div>

</body>
</html>
